name: EventStore Integration Tests

on:
  push:
    branches: [ master, main ]
    paths:
      - 'src/BullOak.Test.EventStore.Integration/**'
      - 'src/BullOak.Repositories/**'
      - '.github/workflows/integration-tests.yml'
  pull_request:
    branches: [ master, main ]
    paths:
      - 'src/BullOak.Test.EventStore.Integration/**'
      - 'src/BullOak.Repositories/**'
      - '.github/workflows/integration-tests.yml'
  workflow_dispatch: # allow manual triggers

jobs:
  integration-tests:
    name: Run EventStoreDB Integration Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 6.0.x

      - name: Restore dependencies
        run: dotnet restore
        working-directory: ./src/BullOak.Test.EventStore.Integration

      - name: Build
        run: dotnet build --no-restore
        working-directory: ./src/BullOak.Test.EventStore.Integration

      - name: Run Integration Tests
        run: dotnet test --no-build --verbosity normal --logger "trx;LogFileName=test-results.trx"
        working-directory: ./src/BullOak.Test.EventStore.Integration

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: integration-test-results
          path: src/BullOak.Test.EventStore.Integration/TestResults/*.trx
          retention-days: 30
